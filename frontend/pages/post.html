<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkWell — Read Story</title>
  <meta name="description" content="Immersive reading mode for long-form articles.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/animations.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/layouts.css">
  <link rel="stylesheet" href="/styles/themes.css">
  
  <style>
    body {
      background: var(--bg-color);
      color: var(--text-primary);
      padding-top: 100px; /* Space for floating navbar */
    }
    
    .article-container {
      max-width: 800px;
      margin: 0 auto var(--space-12) auto;
      padding: 0 var(--space-4);
    }

    .article-card {
      background: var(--surface-color);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--surface-border);
      border-radius: 32px;
      padding: var(--space-8);
      box-shadow: 0 20px 60px var(--shadow-color);
      overflow: hidden;
    }

    /* Article view specific visual polish */
    .immersive-hero {
      position: relative;
      width: 100%;
      height: 400px;
      border-radius: 20px;
      margin-bottom: var(--space-8);
      overflow: hidden;
    }
    
    .immersive-hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.7);
      transition: transform 0.5s ease-out;
    }
    
    .immersive-hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
      display: flex;
      align-items: flex-end;
      padding: var(--space-8);
    }

    .article-title-text {
      font-family: 'Lora', serif;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: var(--space-4);
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .article-meta-row {
      display: flex;
      align-items: center;
      gap: var(--space-6);
    }

    .article-author {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      cursor: pointer;
    }

    .author-avatar-img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      object-fit: cover;
    }

    .author-name-text {
      font-weight: 600;
      font-size: var(--fs-ui);
      color: #ffffff;
    }

    .publish-date-text {
      font-size: var(--fs-meta);
      color: rgba(255, 255, 255, 0.6);
    }

    .article-body-content {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.9);
    }

    .article-body-content p {
      margin-bottom: 24px;
    }

    .article-body-content h1, 
    .article-body-content h2, 
    .article-body-content h3 {
      font-family: 'Inter', sans-serif;
      margin-top: 48px;
      margin-bottom: 20px;
      color: #fff;
    }

    .sticky-engage-bar {
      margin-top: var(--space-8);
      padding: var(--space-4) 0;
      border-top: 1px solid var(--surface-border);
      display: flex;
      gap: var(--space-4);
      align-items: center;
    }

    .sticky-btn {
      background: var(--surface-border);
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sticky-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .sticky-btn.liked {
      color: #F87171;
    }

    .sticky-btn.bookmarked {
      color: var(--color-primary);
    }
    
    .comments-wrapper {
      margin-top: var(--space-12);
      border-top: 1px solid var(--surface-border);
      padding-top: var(--space-8);
    }

    .comments-heading {
      font-size: var(--fs-h2);
      margin-bottom: var(--space-6);
    }
    
    .comment-input-box {
      width: 100%;
      border-radius: 16px;
      padding: var(--space-4);
      border: 1px solid var(--surface-border);
      background: rgba(255, 255, 255, 0.01);
      color: var(--text-primary);
      outline: none;
      resize: vertical;
      min-height: 100px;
      font-family: var(--font-ui);
      margin-bottom: var(--space-3);
    }
    
    .comment-box-footer {
      display: flex;
      justify-content: flex-end;
      margin-bottom: var(--space-8);
    }
    
    .comment-thread-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }
    
    .comment-node {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      padding-left: var(--space-4);
      border-left: 2px solid var(--surface-border);
      margin-left: 8px;
    }
    
    .comment-node.root {
      border-left: none;
      padding-left: 0;
      margin-left: 0;
    }
    
    .comment-card {
      background: var(--surface-color);
      border: 1px solid var(--surface-border);
      border-radius: 12px;
      padding: var(--space-4);
    }
    
    .comment-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    
    .comment-user {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    
    .comment-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    
    .comment-username {
      font-size: var(--fs-meta);
      font-weight: var(--fw-semibold);
    }
    
    .comment-time {
      font-size: 11px;
      color: var(--text-muted);
    }
    
    .comment-body {
      font-size: var(--fs-ui);
      line-height: 1.5;
      color: var(--text-secondary);
    }
    
    .comment-actions {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-2);
    }
    
    .comment-action-link {
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .comment-action-link:hover {
      color: var(--color-primary);
    }
    
    .comment-delete-link {
      color: #F87171;
    }
    
    .comment-delete-link:hover {
      color: #EF4444;
    }

    @media (max-width: 860px) {
      .article-container { padding: 0; }
      .article-card { border-radius: 0; border: none; padding: var(--space-4); }
      .article-title-text { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="theme-gradient-bg"></div>

  <!-- Reusing Dashboard Navbar -->
  <nav class="left-sidebar">
    <a href="/" class="navbar-logo" style="margin: 0; display: flex; align-items: center; gap: 12px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;">
        <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"></path>
        <line x1="16" y1="8" x2="2" y2="22"></line>
        <line x1="17.5" y1="15" x2="9" y2="15"></line>
      </svg>
      <span style="font-weight: 800; font-size: var(--fs-h3); letter-spacing: -0.02em; margin-left: 4px;">InkWell</span>
    </a>
    
    <ul class="nav-list" id="mainNavList">
      <li class="nav-item" id="createBlogBtnNav" title="Create New Post">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; color: var(--color-primary);"><path d="M12 5v14M5 12h14"/></svg>
      </li>
      <li class="nav-item" id="navHome" title="Home Feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </li>
      <li class="nav-item" id="navBookmarks" title="Bookmarks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </li>
      <li class="nav-item" id="navProfileLink" title="My Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </li>
      <li class="nav-item" id="navSettings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </li>
      <li class="nav-item" id="navThemeToggle" title="Toggle Theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </li>
    </ul>
    
    <div id="navUserArea"></div>
  </nav>

  <main class="article-container">
    <div class="article-card">
      <!-- Immersive Cover Hero -->
      <header class="immersive-hero" id="postHero" style="display: none;">
        <img id="postHeroImg" class="immersive-hero-img">
        <div class="immersive-hero-overlay">
          <div class="immersive-title-wrapper">
            <h1 class="article-title-text" id="postTitle">Loading post...</h1>
            <div class="article-meta-row">
              <div class="article-author" id="authorLink">
                <img id="authorAvatar" class="author-avatar-img">
                <div>
                  <div class="author-name-text" id="authorName">...</div>
                  <div class="publish-date-text" id="postDate">...</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- Reading Layout Frame -->
      <article class="article-body-content" id="postBodyContent">
        <div style="padding: var(--space-12) 0; text-align: center;" class="animate-shimmer skeleton-box">
          Reading view is rendering...
        </div>
      </article>

      <!-- Engagement controls -->
      <div class="sticky-engage-bar" id="stickyEngageBar" style="display: none;">
        <button class="sticky-btn" id="likeBtn" title="Like Article">
          <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span class="sticky-btn-counter" id="likeCount">0</span>
        </button>
        
        <button class="sticky-btn" id="bookmarkBtn" title="Bookmark Article">
          <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </button>

        <!-- Author Actions - Hidden by default -->
        <div id="authorActions" style="display: none; margin-left: auto; gap: var(--space-3); align-items: center;">
          <button class="btn btn-ghost" id="editPostBtn" style="padding: 6px 14px; font-size: 0.85rem; border: 1px solid var(--surface-border);">Edit</button>
          <button class="btn btn-ghost" id="deletePostBtn" style="padding: 6px 14px; font-size: 0.85rem; color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2);">Delete</button>
        </div>
      </div>

      <!-- Threaded Comment Section -->
      <section class="comments-wrapper" id="commentsSection" style="display: none;">
        <h3 class="comments-heading">Discussion (<span id="commentsCount">0</span>)</h3>

        <div id="commentFormContainer">
          <textarea id="commentInputText" class="comment-input-box" placeholder="What are your thoughts on this story?"></textarea>
          <div class="comment-box-footer">
            <button class="btn btn-primary" id="submitCommentBtn">Post Comment</button>
          </div>
        </div>
        
        <div id="unauthCommentPrompt" style="display: none; text-align: center; padding: var(--space-6); background: var(--surface-color); border: 1px solid var(--surface-border); border-radius: 12px; margin-bottom: var(--space-8);">
          <p style="font-size: var(--fs-ui); color: var(--text-muted);">Please <a href="/auth" style="font-weight: 600;">log in</a> to participate in the discussion.</p>
        </div>

        <div class="comment-thread-list" id="commentThreadList">
          <!-- Rendered dynamically by post.js -->
        </div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/scripts/post.js"></script>
</body>
</html>
