<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkWell — Dashboard</title>
  <meta name="description" content="Manage your articles, read personalized feeds, and explore trending tags.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/animations.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/layouts.css">
  <link rel="stylesheet" href="/styles/themes.css">
  
  <style>
    /* Add extra page-specific details for dashboard widgets */
    .explore-header {
      margin-top: var(--space-4);
      margin-bottom: var(--space-8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .feed-capsule {
      padding: var(--space-2) var(--space-5);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(31, 77, 58, 0.16);
    }
    
    .feed-title-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      letter-spacing: -0.01em;
    }

    /* Full-width glass editor */
    .editor-glass-card {
      background: var(--surface-color);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--surface-border);
      border-radius: 24px;
      padding: var(--space-8);
      width: 100%;
      box-sizing: border-box;
      box-shadow: 0 10px 40px var(--shadow-color);
    }
    
    .feed-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }
    
    /* Blog post card details */
    .post-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      position: relative;
    }
    
    .post-card-cover {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
    }
    
    .post-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .post-author {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    
    .post-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface-border);
    }
    
    .post-author-name {
      font-size: var(--fs-meta);
      font-weight: var(--fw-semibold);
    }
    
    .post-meta {
      font-size: var(--fs-meta);
      color: var(--text-muted);
    }
    
    .post-card-title {
      font-size: var(--fs-h2);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      cursor: pointer;
    }
    
    .post-card-title:hover {
      color: var(--color-primary);
    }
    
    .post-card-excerpt {
      font-size: var(--fs-ui);
      color: var(--text-muted);
      line-height: var(--lh-ui);
    }
    
    .post-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--surface-border);
      padding-top: var(--space-3);
      margin-top: var(--space-2);
    }
    
    .post-card-tags {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    
    .post-card-actions {
      display: flex;
      gap: var(--space-4);
      align-items: center;
    }
    
    .action-icon {
      font-size: var(--fs-ui);
      color: var(--text-muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color var(--transition-fast);
      user-select: none;
    }
    
    .action-icon:hover {
      color: var(--color-primary);
    }
    
    .action-icon.liked {
      color: #EF4444;
    }
    
    .action-icon.bookmarked {
      color: var(--color-primary);
    }
    
    /* Trending sidebar widget */
    .trending-title {
      font-size: var(--fs-h3);
      margin-bottom: var(--space-4);
      color: var(--text-primary);
    }
    
    .trending-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    
    .trending-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--surface-border);
      font-size: var(--fs-ui);
    }
    
    .trending-tag {
      font-weight: var(--fw-semibold);
      cursor: pointer;
      color: var(--text-muted);
    }
    
    .trending-tag:hover {
      color: var(--color-primary);
    }
    
    .trending-count {
      color: var(--text-muted);
      font-size: var(--fs-meta);
    }
    
    /* Floating creation CTA */
    .floating-cta {
      position: fixed;
      bottom: var(--space-6);
      right: var(--space-6);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--color-primary);
      box-shadow: 0 4px 20px var(--color-primary-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: transform var(--transition-fast);
    }
    
    .floating-cta svg {
      width: 24px;
      height: 24px;
      color: #1a1a1a;
    }
    
    /* Editor styling */
    .editor-wrapper {
      max-width: var(--max-width-article);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      padding-top: var(--space-4);
    }
    
    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--surface-border);
      padding-bottom: var(--space-3);
      margin-bottom: var(--space-4);
    }
    
    .editor-status-indicator {
      font-size: var(--fs-meta);
      color: var(--text-muted);
    }
    
    .cover-upload-zone {
      width: 100%;
      height: 240px;
      border: 2px dashed var(--surface-border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.01);
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }
    
    .cover-upload-zone:hover {
      border-color: var(--color-primary);
      background: rgba(31, 77, 58, 0.02);
    }
    
    .cover-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    .editor-title-field {
      font-size: var(--fs-hero);
      font-weight: var(--fw-extrabold);
      color: var(--text-primary);
      min-height: 50px;
      line-height: 1.2;
      outline: none;
      word-break: break-word;
    }
    
    .editor-title-field[placeholder]:empty:before {
      content: attr(placeholder);
      color: var(--text-muted);
      opacity: 0.5;
    }
    
    .editor-body-field {
      font-family: var(--font-serif);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      min-height: 300px;
      outline: none;
      color: var(--text-primary);
    }
    
    .editor-body-field p {
      margin-bottom: var(--space-4);
    }
    
    .editor-body-field[placeholder]:empty:before {
      content: attr(placeholder);
      color: var(--text-muted);
      opacity: 0.5;
      font-family: var(--font-ui);
    }
    
    .tags-input-zone {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-2);
      border-bottom: 1px solid var(--surface-border);
      padding-bottom: var(--space-3);
    }
    
    .tags-pills-list {
      display: inline-flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    
    .tag-input-text {
      flex: 1;
      min-width: 120px;
      padding: var(--space-1) var(--space-2);
      font-size: var(--fs-ui);
    }
    
    .slash-menu {
      position: absolute;
      background: var(--surface-color);
      border: 1px solid var(--surface-border);
      border-radius: 12px;
      box-shadow: 0 10px 30px var(--shadow-color);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 1000;
      width: 220px;
      padding: var(--space-2);
      display: none;
    }
    
    .slash-menu-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: var(--fs-ui);
      color: var(--text-primary);
      transition: background var(--transition-fast);
    }
    
    .slash-menu-item:hover, .slash-menu-item.selected {
      background: var(--surface-border);
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <script>document.documentElement.dataset.apiBaseUrl = 'https://inkwell-yaahvi.up.railway.app';</script>
  <div class="theme-gradient-bg"></div>

  <div class="dashboard-grid">
    <!-- Left Navigation Sidebar -->
    <nav class="left-sidebar">
      <a href="/" class="navbar-logo" style="margin: 0; display: flex; align-items: center; gap: 12px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;">
          <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"></path>
          <line x1="16" y1="8" x2="2" y2="22"></line>
          <line x1="17.5" y1="15" x2="9" y2="15"></line>
        </svg>
        <span style="font-weight: 800; font-size: var(--fs-h3); letter-spacing: -0.02em; margin-left: 4px;">InkWell</span>
      </a>
      
      <ul class="nav-list">
        <li class="nav-item" id="createBlogBtnNav" title="Create New Post">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; color: var(--color-primary);"><path d="M12 5v14M5 12h14"/></svg>
        </li>
        <li class="nav-item active" id="navHome" title="Home Feed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </li>
        <li class="nav-item" id="navBookmarks" title="Bookmarks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </li>
        <li class="nav-item" id="navProfileLink" title="My Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </li>
        <li class="nav-item" id="navSettings" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </li>
        <li class="nav-item" id="navThemeToggle" title="Toggle Theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </li>
      </ul>
      <div id="navUserArea"></div>
    </nav>

    <div class="dashboard-content-wrapper" style="grid-template-columns: 1fr; width: calc(100% - 32px); max-width: var(--max-width-page); margin: 0 auto;">
      <!-- Main Content Grid Column -->
      <main class="main-content" style="max-width: none; width: 100%; margin: 32px auto 0 auto;">
      <!-- 1. Feed view frame -->
      <div id="feedView">
        <!-- Hero Banner Section -->
        <div class="hero-banner-card" id="heroGrainient">
          <div id="heroCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>
          <div class="hero-banner-content">
            <h1 class="hero-banner-title" id="feedTitle">Personalised Feed</h1>
            <a href="#create" class="btn btn-primary" style="text-decoration: none; display: inline-block; padding: 12px 32px; background: #fff; color: #000; border: none; font-weight: 700;">Create Your Blog</a>
          </div>
          <div class="hero-banner-image">
            <img src="https://images.unsplash.com/photo-1599707334706-53298a249a37?q=80&w=1000&auto=format&fit=crop" alt="Premium Content">
          </div>
        </div>

        <div class="feed-grid" id="feedContainer">
          <!-- Populated by feed.js -->
        </div>
        <div id="feedFooter" style="height: 50px;"></div>
      </div>

      <!-- 2. Editor view frame (Writer's Canvas) -->
      <div id="editorView" style="display: none; width: 100%;">
        <div class="editor-glass-card" style="width: 100%; box-sizing: border-box;">
          <div class="editor-toolbar">
            <div class="editor-status-indicator" id="editorStatus">Saved</div>
            <div style="display: flex; gap: var(--space-3);">
              <button class="btn btn-ghost" id="saveDraftBtn">Save Draft</button>
              <button class="btn btn-primary" id="publishBtn" style="padding: 10px 24px;">Publish Article</button>
            </div>
          </div>

          <!-- Cover Image Upload zone -->
          <div class="cover-upload-zone" id="coverUploadZone" style="height: 300px; margin-bottom: var(--space-8);">
            <input type="file" id="coverFileInput" accept="image/png, image/jpeg, image/webp" style="display: none;">
            <div id="uploadPlaceholder">
              <div style="font-size: 2rem; margin-bottom: 12px;">🎨</div>
              <div style="font-weight: 600; font-size: 1.1rem;">Set your cover story image</div>
              <div style="font-size: var(--fs-meta); color: var(--text-muted); margin-top: 6px;">Visuals make stories travel further.</div>
            </div>
            <img id="coverImgPreview" class="cover-preview" style="display: none;">
          </div>

          <!-- Title Field -->
          <div class="editor-title-field" id="editorTitle" contenteditable="true" placeholder="Article title..." style="font-size: 3rem; margin-bottom: var(--space-6);"></div>

          <!-- Body Editor -->
          <div class="editor-body-field" id="editorBody" contenteditable="true" placeholder="Tell your story... Use / for blocks" style="min-height: 400px; font-size: 1.2rem;"></div>
        </div>
      </div>
    </main>

    <!-- Slash Block menu popover overlay -->
    <div class="slash-menu" id="slashMenu">
      <div class="slash-menu-item" data-block="h1">
        <span style="font-weight: 700;">H1</span> Heading 1
      </div>
      <div class="slash-menu-item" data-block="h2">
        <span style="font-weight: 600;">H2</span> Heading 2
      </div>
      <div class="slash-menu-item" data-block="h3">
        <span style="font-weight: 600;">H3</span> Heading 3
      </div>
      <div class="slash-menu-item" data-block="blockquote">
        <span>❞</span> Blockquote
      </div>
      <div class="slash-menu-item" data-block="code">
        <span>&lt;/&gt;</span> Code Block
      </div>
    </div>
  </div>
</div>

  <!-- Script Modules -->
  <script type="module">
    import { initTheme } from '/scripts/utils.js';
    import { Grainient } from '/scripts/grainient.js';

    document.addEventListener('DOMContentLoaded', () => {
      initTheme();

      // Hero Banner Grainient
      const heroCanvas = document.getElementById('heroCanvas');
      if (heroCanvas) {
        new Grainient(heroCanvas, {
          color1: '#1f4d3a',
          color2: '#4f8a6b',
          color3: '#b7d6c3',
          timeSpeed: 4.0, 
          zoom: 1.5,
          grainAmount: 0.1
        });
      }
    });
  </script>
  <script type="module" src="/scripts/feed.js"></script>
  <script type="module" src="/scripts/editor.js"></script>
</body>
</html>
