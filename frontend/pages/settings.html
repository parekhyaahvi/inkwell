<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkWell — Settings</title>
  <meta name="description" content="Configure your profile settings and theme configuration.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/animations.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/layouts.css">
  <link rel="stylesheet" href="/styles/themes.css">
  
  <style>
    body {
      background: var(--bg-color);
      color: var(--text-primary);
      padding-top: 100px;
    }
    
    .settings-container {
      max-width: var(--max-width-page);
      margin: 0 auto var(--space-12) auto;
      padding: 0 var(--space-4);
    }

    .settings-card {
      width: 100%;
      background: var(--surface-color);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--surface-border);
      border-radius: 32px;
      padding: var(--space-6);
      box-shadow: 0 20px 60px var(--shadow-color);
    }
    
    .settings-heading {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: var(--space-6);
      letter-spacing: -0.03em;
    }
    
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      border: none;
      padding: 0;
      background: none;
      box-shadow: none;
      margin-bottom: var(--space-8);
    }
    
    .settings-section-title {
      font-size: var(--fs-h2);
      font-weight: 800;
      border-bottom: 1px solid var(--surface-border);
      padding-bottom: var(--space-3);
      margin-bottom: var(--space-3);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .form-group {
      margin-bottom: var(--space-4);
    }

    .avatar-upload-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .avatar-upload-preview {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--surface-border);
      background: rgba(255, 255, 255, 0.03);
      display: none;
    }

    .avatar-upload-meta {
      font-size: var(--fs-meta);
      color: var(--text-muted);
    }

    .form-label {
      display: block;
      font-weight: 600;
      font-size: var(--fs-ui);
      margin-bottom: var(--space-2);
      color: var(--text-secondary);
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--surface-border);
      border-radius: 14px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: var(--fs-ui);
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 3px var(--color-primary-glow);
    }

    .settings-inner-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--surface-border);
      border-radius: 20px;
      padding: var(--space-4);
    }
    
    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3) 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .settings-row:last-child {
      border-bottom: none;
    }
    
    .settings-label-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .settings-label-title {
      font-weight: 600;
      font-size: var(--fs-ui);
    }
    
    .settings-label-desc {
      font-size: var(--fs-meta);
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .settings-card { padding: var(--space-4); border-radius: 20px; }
      .settings-heading { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <script>document.documentElement.dataset.apiBaseUrl = '__INKWELL_API_BASE_URL__';</script>
  <div class="theme-gradient-bg"></div>

  <!-- Reusing Dashboard Navbar -->
  <nav class="left-sidebar">
    <a href="/" class="navbar-logo" style="margin: 0; display: flex; align-items: center; gap: 12px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;">
        <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"></path>
        <line x1="16" y1="8" x2="2" y2="22"></line>
        <line x1="17.5" y1="15" x2="9" y2="15"></line>
      </svg>
      <span style="font-weight: 800; font-size: var(--fs-h3); letter-spacing: -0.02em; margin-left: 4px;">InkWell</span>
    </a>
    
    <ul class="nav-list" id="mainNavList">
      <li class="nav-item" id="createBlogBtnNav" title="Create New Post">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 22px; height: 22px; color: var(--color-primary);"><path d="M12 5v14M5 12h14"/></svg>
      </li>
      <li class="nav-item" id="navHome" title="Home Feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </li>
      <li class="nav-item" id="navBookmarks" title="Bookmarks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </li>
      <li class="nav-item" id="navProfileLink" title="My Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </li>
      <li class="nav-item active" id="navSettings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </li>
      <li class="nav-item" id="navThemeToggle" title="Toggle Theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </li>
    </ul>
    <div id="navUserArea"></div>
  </nav>

  <main class="settings-container">
    <div class="settings-card">
      <h1 class="settings-heading">Settings</h1>
      
      <!-- Profile Configuration Form -->
      <section class="settings-section animate-fade-in">
        <h3 class="settings-section-title">Profile Configuration</h3>
        <form id="profileSettingsForm" class="settings-inner-card">
          <div class="form-group">
            <label class="form-label" for="displayName">Display Name</label>
            <input type="text" id="displayName" class="form-input" required placeholder="e.g. Priya Sharma">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="bio">Biography</label>
            <textarea id="bio" class="form-input" style="min-height: 100px; resize: vertical;" placeholder="Tell us about yourself..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Avatar Image</label>
            <div class="avatar-upload-row">
              <button type="button" class="btn btn-ghost" id="avatarUploadBtn">Upload Image</button>
              <input type="file" id="avatarFileInput" accept="image/png, image/jpeg, image/webp" hidden>
              <img id="avatarPreview" class="avatar-upload-preview" alt="Avatar preview">
              <span class="avatar-upload-meta" id="avatarUploadMeta">No image selected</span>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-4);">Save Profile</button>
        </form>
      </section>

      <!-- Appearance Configuration -->
      <section class="settings-section animate-fade-in" style="animation-delay: 120ms;">
        <h3 class="settings-section-title">Appearance</h3>
        <div class="settings-inner-card">
          <div class="settings-row">
            <div class="settings-label-col">
              <span class="settings-label-title">Dark Mode Theme</span>
              <span class="settings-label-desc">Toggle the dark glassmorphic look across the app.</span>
            </div>
            <button class="btn btn-ghost" id="themeToggleBtn">Toggle</button>
          </div>
        </div>
      </section>

      <!-- Account Details -->
      <section class="settings-section animate-fade-in" style="animation-delay: 200ms;">
        <h3 class="settings-section-title">Account details</h3>
        <div class="settings-inner-card">
          <div class="settings-row">
            <div class="settings-label-col">
              <span class="settings-label-title">Registered Email</span>
              <span class="settings-label-desc" id="accountEmail">email@inkwell.app</span>
            </div>
          </div>
          
          <div class="settings-row" style="border-top: 1px solid rgba(248, 113, 113, 0.1); margin-top: var(--space-4); padding-top: var(--space-6);">
            <div class="settings-label-col">
              <span class="settings-label-title" style="color: #EF4444;">Sign Out</span>
              <span class="settings-label-desc">End your current session on this device</span>
            </div>
            <button class="btn btn-ghost" id="logoutBtn" style="color: #EF4444; border-color: rgba(239, 68, 68, 0.2);">Log Out</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Load script logic -->
  <script type="module" src="/scripts/settings.js"></script>
</body>
</html>
