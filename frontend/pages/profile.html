<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkWell — Profile</title>
  <meta name="description" content="View writer portfolio, published works, and stats.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/animations.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/layouts.css">
  <link rel="stylesheet" href="/styles/themes.css">
  
  <style>
    body {
      background: var(--bg-color);
      color: var(--text-primary);
      padding-top: 100px;
    }

    .main-container {
      max-width: 1000px;
      margin: 0 auto var(--space-12) auto;
      padding: 0 var(--space-4);
    }

    .profile-card {
      background: var(--surface-color);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--surface-border);
      border-radius: 32px;
      padding: var(--space-8);
      box-shadow: 0 20px 60px var(--shadow-color);
      margin-bottom: var(--space-8);
    }

    /* Profile specific design system tokens */
    .profile-header-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: var(--space-4);
      position: relative;
    }
    
    .profile-avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--color-primary);
      box-shadow: 0 0 25px var(--color-primary-glow);
      background: var(--surface-border);
      object-fit: cover;
    }
    
    .profile-name {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    
    .profile-handle {
      font-size: var(--fs-ui);
      color: var(--text-muted);
      margin-top: -8px;
    }
    
    .profile-bio {
      max-width: 500px;
      font-size: var(--fs-ui);
      line-height: var(--lh-ui);
      color: var(--text-muted);
      margin-top: var(--space-2);
    }
    
    .profile-stats-row {
      display: flex;
      gap: var(--space-8);
      margin: var(--space-6) 0;
    }
    
    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .stat-number {
      font-size: var(--fs-h2);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
    }
    
    .stat-label {
      font-size: var(--fs-meta);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .profile-action-area {
      margin-top: var(--space-4);
    }
    
    /* Masonry grid portfolio published works */
    .masonry-portfolio {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-6);
      width: 100%;
      margin-top: var(--space-6);
    }
    
    .portfolio-title {
      font-size: var(--fs-h2);
      font-weight: 800;
      margin-bottom: var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .portfolio-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--surface-border);
    }

    @media (max-width: 768px) {
      .profile-card { padding: var(--space-6); border-radius: 20px; }
      .profile-name { font-size: 2rem; }
      .masonry-portfolio { grid-template-columns: 1fr; }
    }

    .masonry-item {
      width: 100%;
      margin-bottom: 0;
    }
    
    .masonry-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    
    .masonry-cover {
      width: 100%;
      height: auto;
      max-height: 200px;
      object-fit: cover;
      border-radius: 12px;
    }

    .masonry-title {
      font-size: var(--fs-h3);
      font-weight: var(--fw-bold);
      color: var(--text-primary);
      cursor: pointer;
    }

    .masonry-title:hover {
      color: var(--color-primary);
    }

    .masonry-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--fs-meta);
      color: var(--text-muted);
      border-top: 1px solid var(--surface-border);
      padding-top: var(--space-2);
      margin-top: var(--space-1);
    }
  </style>
</head>
<body>
  <div class="theme-gradient-bg"></div>

  <!-- Reusing Dashboard Navbar -->
  <nav class="left-sidebar">
    <a href="/" class="navbar-logo" style="margin: 0; display: flex; align-items: center; gap: 12px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;">
        <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"></path>
        <line x1="16" y1="8" x2="2" y2="22"></line>
        <line x1="17.5" y1="15" x2="9" y2="15"></line>
      </svg>
      <span style="font-weight: 800; font-size: var(--fs-h3); letter-spacing: -0.02em; margin-left: 4px;">InkWell</span>
    </a>
    
    <ul class="nav-list" id="mainNavList">
      <li class="nav-item" id="createBlogBtnNav" title="Create New Post">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; color: var(--color-primary);"><path d="M12 5v14M5 12h14"/></svg>
      </li>
      <li class="nav-item" id="navHome" title="Home Feed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </li>
      <li class="nav-item" id="navBookmarks" title="Bookmarks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </li>
      <li class="nav-item active" id="navProfileLink" title="My Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </li>
      <li class="nav-item" id="navSettings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </li>
      <li class="nav-item" id="navThemeToggle" title="Toggle Theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </li>
    </ul>
    <div id="navUserArea"></div>
  </nav>

  <main class="main-container">
    <!-- Header Profile card -->
    <header class="profile-card animate-fade-in">
      <div class="profile-header-content">
        <img id="profileAvatar" class="profile-avatar-large" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80">
        <div>
          <h1 class="profile-name" id="profileName">...</h1>
          <div class="profile-handle" id="profileHandle">@username</div>
        </div>
        
        <p class="profile-bio" id="profileBio">Writer bio content here...</p>

        <!-- Stat counters -->
        <div class="profile-stats-row">
          <div class="stat-box">
            <span class="stat-number" id="statsPosts">0</span>
            <span class="stat-label">Posts</span>
          </div>
          <div class="stat-box">
            <span class="stat-number" id="statsFollowers">0</span>
            <span class="stat-label">Followers</span>
          </div>
          <div class="stat-box">
            <span class="stat-number" id="statsFollowing">0</span>
            <span class="stat-label">Following</span>
          </div>
        </div>

        <!-- Action follow buttons -->
        <div class="profile-action-area" id="profileActionArea">
          <!-- populated dynamically (Edit Profile or Follow/Unfollow) -->
        </div>
      </div>
    </header>

    <h2 class="portfolio-title">Published Works</h2>
    
    <!-- Masonry grid of cards -->
    <div class="masonry-portfolio" id="masonryPortfolio">
      <!-- populated dynamically -->
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Load script logic -->
  <script type="module" src="/scripts/profile.js"></script>
</body>
</html>
