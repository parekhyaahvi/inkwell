<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>document.documentElement.dataset.apiBaseUrl = 'https://inkwell-yaahvi.up.railway.app';</script>
  <title>InkWell — A Modern Blogging Experience for Everyday Writers</title>
  <meta name="description" content="InkWell combines distraction-free composition with a glassmorphism aesthetic and reading community.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/jpeg" href="/assets/logo.jpeg">

  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/animations.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/layouts.css">
  <link rel="stylesheet" href="/styles/themes.css">
  
  <style>
    /* Public landing page custom layout rules */
    body {
      overflow-y: hidden; /* Only for the beautiful landing feel */
      background: #06110c;
      color: #ffffff;
    }

    .grainient-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      pointer-events: none;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .hero-section {
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--space-4);
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      animation: float 6s ease-in-out infinite;
    }

    .logo-mark {
      width: 56px;
      height: 56px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .logo-mark svg {
      width: 30px;
      height: 30px;
      color: #b7d6c3;
      filter: drop-shadow(0 0 8px rgba(183, 214, 195, 0.35));
    }

    .app-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(to bottom, #ffffff, #b7d6c3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .hero-title {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.04em;
      color: #ffffff;
      margin-bottom: var(--space-4);
      white-space: nowrap;
    }
    
    .hero-desc {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      max-width: 500px;
      margin-bottom: var(--space-12);
      font-weight: 400;
    }

    .hero-glow {
      position: absolute;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, #4f8a6b 0%, transparent 70%);
      filter: blur(100px);
      opacity: 0.15;
      z-index: -1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .button-group {
      display: flex; 
      gap: var(--space-4);
      margin-bottom: var(--space-12);
    }

    .btn-landing-primary {
      background: #ffffff !important;
      color: #06110c !important;
      border-radius: 999px !important;
      font-weight: 700 !important;
      padding: 16px 48px !important;
      font-size: 1.1rem !important;
      border: none !important;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 20px rgba(183, 214, 195, 0.28);
    }

    .btn-landing-secondary {
      background: rgba(255, 255, 255, 0.05) !important;
      color: #ffffff !important;
      border-radius: 999px !important;
      font-weight: 500 !important;
      padding: 16px 48px !important;
      font-size: 1.1rem !important;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn-landing-primary:hover {
      transform: scale(1.03);
      box-shadow: 0 0 30px rgba(183, 214, 195, 0.42);
    }

    .btn-landing-secondary:hover {
      background: rgba(255, 255, 255, 0.2) !important;
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div id="grainientBackground" class="grainient-wrapper"></div>
  <div class="theme-gradient-bg"></div>
  <div class="hero-glow"></div>

  <div class="container">
    <section class="hero-section animate-fade-in">
      <div class="brand-group">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5l6.74-6.76z"></path>
            <line x1="16" y1="8" x2="2" y2="22"></line>
            <line x1="17.5" y1="15" x2="9" y2="15"></line>
          </svg>
        </div>
        <span class="app-name">InkWell</span>
      </div>

      <h1 class="hero-title">Write. Connect. Belong.</h1>
      
      <p class="hero-desc">
        A premium, distraction-free space for modern writers to share stories and build community.
      </p>
      
      <div class="button-group">
        <button class="btn btn-landing-primary" id="startWritingBtn">Start Writing</button>
        <button class="btn btn-landing-secondary" id="loginBtn">Log In</button>
      </div>
    </section>
  </div>
  <script type="module">
    import { initTheme } from '/scripts/utils.js';
    import { Grainient } from '/scripts/grainient.js';

    document.addEventListener('DOMContentLoaded', () => {
      initTheme();

      // Fix CSP violations by moving inline handlers to event listeners
      document.getElementById('startWritingBtn')?.addEventListener('click', () => {
        window.location.href = '/auth?mode=signup';
      });
      document.getElementById('loginBtn')?.addEventListener('click', () => {
        window.location.href = '/auth?mode=login';
      });

      // Initialize the Grainient background with the green palette
      const container = document.getElementById('grainientBackground');
      new Grainient(container, {
        color1: '#1f4d3a',
        color2: '#4f8a6b',
        color3: '#b7d6c3',
        timeSpeed: 3.0,    // High energy motion
        zoom: 0.9,
        grainAmount: 0.1,
        warpStrength: 1.0,
        contrast: 1.2,
        saturation: 1.1
      });
    });
  </script>
</body>
</html>
